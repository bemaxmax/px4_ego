# 3D lidar model version.

- ros_topic_name: /lidar_points
  gz_topic_name: /world/default/model/x500_lidar_depth_3d_0/link/lidar_link/sensor/lidar_3d/scan/points
  ros_type_name: sensor_msgs/msg/PointCloud2
  gz_type_name: gz.msgs.PointCloudPacked
  direction: GZ_TO_ROS

- ros_topic_name: /imu
  gz_topic_name: /world/default/model/x500_lidar_depth_3d_0/link/base_link/sensor/imu_sensor/imu
  ros_type_name: sensor_msgs/msg/Imu
  gz_type_name: gz.msgs.IMU
  direction: GZ_TO_ROS

- ros_topic_name: /depth_camera
  gz_topic_name: /depth_camera
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

- ros_topic_name: /rgb_camera
  gz_topic_name: /world/default/model/x500_lidar_depth_3d_0/link/camera_link/sensor/IMX214/image
  ros_type_name: sensor_msgs/msg/Image
  gz_type_name: gz.msgs.Image
  direction: GZ_TO_ROS

- ros_topic_name: /rgb_camera/camera_info
  gz_topic_name: /world/default/model/x500_lidar_depth_3d_0/link/camera_link/sensor/IMX214/camera_info
  ros_type_name: sensor_msgs/msg/CameraInfo
  gz_type_name: gz.msgs.CameraInfo
  direction: GZ_TO_ROS

- ros_topic_name: /clock
  gz_topic_name: /clock
  ros_type_name: rosgraph_msgs/msg/Clock
  gz_type_name: gz.msgs.Clock
  direction: GZ_TO_ROS
